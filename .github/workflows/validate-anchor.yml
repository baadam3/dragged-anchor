name: Validate Anchor

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Read flag.txt from runner
        id: read_flag
        run: |
          if [ -f flag.txt ]; then
            echo "Flag file found."
            cat flag.txt
          else
            echo "Error: flag.txt not found!"
            exit 1
          fi

      - name: Log flag content
        run: |
          echo "Logging flag content..."
          echo "Flag content: \n${{ steps.read_flag.outputs.content }}"

      - name: Commit flag.txt to repository
        run: |
          if [ -f flag.txt ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add flag.txt
            git commit -m "Add flag.txt with error handling and logging" || echo "No changes to commit."
            git push origin main
          else
            echo "Error: flag.txt not found! Can't commit!"
            exit 1
          fi
